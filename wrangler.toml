# ⚠️ IMPORTANTE: este arquivo é apenas referência/metadados.
#
# O build (Nitro preset `cloudflare-module`, via
# @lovable.dev/vite-tanstack-config) gera AUTOMATICAMENTE o config real em:
#
#   dist/server/wrangler.json   ← USE ESTE NO DEPLOY
#   dist/server/index.mjs       ← entrypoint Worker
#   dist/client/                ← assets estáticos (binding ASSETS)
#
# Por isso, ao rodar o build você verá:
#   WARN [cloudflare] Wrangler config main is overridden and will be ignored.
#   WARN [cloudflare] Wrangler config assets is overridden and will be ignored.
#
# Deploy correto:
#   npm run build
#   npx wrangler deploy -c dist/server/wrangler.json
#   # ou: npx nitro deploy --prebuilt
#
# Os scripts em package.json (`deploy`, `deploy:preview`, `cf:tail`) já
# apontam para `dist/server/wrangler.json`.

name = "shadow-archive"
main = "./dist/server/index.mjs"
compatibility_date = "2025-06-01"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "./dist/client"
binding = "ASSETS"
not_found_handling = "single-page-application"

[observability]
enabled = true

[vars]
NODE_ENV = "production"

[env.preview]
name = "shadow-archive-preview"

[env.preview.vars]
NODE_ENV = "preview"