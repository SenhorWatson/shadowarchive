# Configuração estável para Cloudflare Workers SSR.
#
# O build ainda gera `dist/server/wrangler.json`, mas o deploy em CI deve usar
# ESTE arquivo da raiz para evitar depender de um caminho gerado dentro de
# `dist/server/` que pode não existir no momento em que o Wrangler inicia.
#
# Fluxo suportado:
#   npm run build
#   npx wrangler deploy
#
# Artefatos reais produzidos pelo build:
#   dist/server/index.mjs
#   dist/server/wrangler.json
#   dist/client/

name = "shadow-archive"
main = "./dist/server/index.mjs"
compatibility_date = "2025-06-01"
compatibility_flags = ["nodejs_compat"]
no_bundle = true

[assets]
directory = "./dist/client"
binding = "ASSETS"
not_found_handling = "single-page-application"

[observability]
enabled = true

[vars]
NODE_ENV = "production"

[[rules]]
type = "ESModule"
globs = ["**/*.mjs", "**/*.js"]

[env.preview]
name = "shadow-archive-preview"

[env.preview.vars]
NODE_ENV = "preview"